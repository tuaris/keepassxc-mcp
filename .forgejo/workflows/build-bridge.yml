name: Build Windows Bridge

on:
  push:
    branches: [master]
    paths:
      - 'bridge/**'
      - '.forgejo/workflows/build-bridge.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows
    steps:
      - name: Checkout
        shell: powershell
        run: |
          $archiveUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/archive/$env:GITHUB_REF_NAME.zip"
          Write-Host "Downloading $archiveUrl"
          Invoke-WebRequest -Uri $archiveUrl -OutFile repo.zip
          Expand-Archive -Path repo.zip -DestinationPath .
          $extracted = Get-ChildItem -Directory | Where-Object { $_.Name -like "keepassxc-mcp*" } | Select-Object -First 1
          Copy-Item -Path "$($extracted.FullName)\*" -Destination . -Recurse -Force
          Remove-Item -Recurse -Force $extracted.FullName, repo.zip
          Write-Host "Files:"
          Get-ChildItem -Name

      - name: Install Zig
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          # Bypass SSL validation (runner has minimal CA store)
          if (-not ([System.Management.Automation.PSTypeName]'TrustAll').Type) {
            Add-Type @"
              using System.Net;
              using System.Net.Security;
              using System.Security.Cryptography.X509Certificates;
              public class TrustAll {
                public static void Enable() {
                  ServicePointManager.ServerCertificateValidationCallback =
                    delegate { return true; };
                }
              }
          "@
          }
          [TrustAll]::Enable()
          $zigVersion = "0.14.0"
          $zigUrl = "https://ziglang.org/download/$zigVersion/zig-windows-x86_64-$zigVersion.zip"
          Write-Host "Downloading Zig $zigVersion..."
          Invoke-WebRequest -Uri $zigUrl -OutFile zig.zip -UseBasicParsing
          Expand-Archive -Path zig.zip -DestinationPath .
          Rename-Item "zig-windows-x86_64-$zigVersion" zig
          .\zig\zig.exe version

      - name: Build kpxc-bridge.exe
        shell: cmd
        run: |
          zig\zig.exe cc -O2 bridge/kpxc-bridge.c -lws2_32 -ladvapi32 -o kpxc-bridge.exe
          if not exist kpxc-bridge.exe exit /b 1
          echo Build successful

      - name: Publish release
        shell: powershell
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $baseUrl = "${{ github.server_url }}/api/v1/repos/$repo"
          $headers = @{ "Authorization" = "token $env:FORGEJO_TOKEN"; "Content-Type" = "application/json" }
          $tag = "latest"

          # Delete existing release if present
          try {
            $existing = Invoke-RestMethod -Uri "$baseUrl/releases/tags/$tag" -Headers $headers -Method Get -ErrorAction SilentlyContinue
            if ($existing.id) {
              Invoke-RestMethod -Uri "$baseUrl/releases/$($existing.id)" -Headers $headers -Method Delete
            }
          } catch {}

          # Delete existing tag if present
          try {
            Invoke-RestMethod -Uri "$baseUrl/tags/$tag" -Headers $headers -Method Delete -ErrorAction SilentlyContinue
          } catch {}

          # Create release
          $body = @{
            tag_name = $tag
            name = "Latest Build"
            body = "Automated build of kpxc-bridge.exe from master branch.`n`nCommit: ${{ github.sha }}"
            draft = $false
            prerelease = $false
            target_commitish = "master"
          } | ConvertTo-Json

          $release = Invoke-RestMethod -Uri "$baseUrl/releases" -Headers $headers -Method Post -Body $body
          $releaseId = $release.id
          Write-Host "Release ID: $releaseId"

          # Upload binary
          $uploadUrl = "$baseUrl/releases/$releaseId/assets?name=kpxc-bridge.exe"
          $uploadHeaders = @{ "Authorization" = "token $env:FORGEJO_TOKEN"; "Content-Type" = "application/octet-stream" }
          Invoke-RestMethod -Uri $uploadUrl -Headers $uploadHeaders -Method Post -InFile "kpxc-bridge.exe"

          Write-Host "Release created with kpxc-bridge.exe attached"
