name: Build Windows Bridge

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: FreeBSD-15.0
    steps:
      - name: Checkout
        run: |
          cd "$GITHUB_WORKSPACE"
          rm -rf ./* ./.??*
          curl -sLo repo.tar.gz "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/archive/$GITHUB_REF_NAME.tar.gz"
          tar xf repo.tar.gz --strip-components=1
          rm repo.tar.gz

      - name: Build kpxc-bridge.exe
        run: |
          zig cc -O2 -target x86_64-windows-gnu bridge/kpxc-bridge.c -lws2_32 -ladvapi32 -o kpxc-bridge.exe
          file kpxc-bridge.exe
          ls -l kpxc-bridge.exe

      - name: Publish release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          BASE_URL="$GITHUB_SERVER_URL/api/v1/repos/$REPO"
          TAG="$GITHUB_REF_NAME"
          AUTH="Authorization: token $FORGEJO_TOKEN"

          # Delete existing release for this tag if present
          EXISTING_ID=$(curl -sf -H "$AUTH" "$BASE_URL/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
          if [ -n "$EXISTING_ID" ]; then
            curl -sf -X DELETE -H "$AUTH" "$BASE_URL/releases/$EXISTING_ID"
            echo "Deleted existing release $EXISTING_ID"
          fi

          # Create release
          RELEASE_ID=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"kpxc-bridge.exe for Windows x86_64.\\n\\nCommit: $GITHUB_SHA\",\"draft\":false,\"prerelease\":false}" \
            "$BASE_URL/releases" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created release $RELEASE_ID"

          # Upload binary
          curl -sf -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @kpxc-bridge.exe \
            "$BASE_URL/releases/$RELEASE_ID/assets?name=kpxc-bridge.exe"
          echo "Uploaded kpxc-bridge.exe to release $TAG"
