name: Build Windows Bridge

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  LINUX_JAIL: linux-build-${{ github.run_id }}
  JAIL_ROOT: /usr/local/jails

jobs:
  build-and-release:
    runs-on: FreeBSD
    steps:
      - name: Checkout
        run: |
          cd "$GITHUB_WORKSPACE"
          rm -rf ./* ./.??*
          curl -sLo repo.tar.gz "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/archive/$GITHUB_REF_NAME.tar.gz"
          tar xf repo.tar.gz --strip-components=1
          rm repo.tar.gz

      # --- Cross-compile with zig (directly on host) ---
      - name: Install zig
        run: |
          which zig && zig version || doas pkg install -y zig

      - name: Build kpxc-bridge.exe
        run: |
          zig cc -O2 -target x86_64-windows-gnu bridge/kpxc-bridge.c -lws2_32 -ladvapi32 -o kpxc-bridge.exe
          file kpxc-bridge.exe
          ls -l kpxc-bridge.exe

      # --- Linux jail: build NSIS installer ---
      - name: Provision Linux jail
        run: |
          JAIL="$LINUX_JAIL"
          JPATH="$JAIL_ROOT/$JAIL"
          TMPBASE="/tmp/linux-rootfs-ubuntu-24.04.4.tar.gz"

          doas kldload linux64 2>/dev/null || true
          doas kldload linux_common 2>/dev/null || true

          if [ ! -f "$TMPBASE" ]; then
            echo "==> Fetching Ubuntu 24.04 rootfs..."
            curl -fSL -o "$TMPBASE" "https://cdimage.ubuntu.com/ubuntu-base/releases/noble/release/ubuntu-base-24.04.4-base-amd64.tar.gz"
          fi

          doas mkdir -p "$JPATH"
          doas tar -xf "$TMPBASE" -C "$JPATH"
          doas cp /etc/resolv.conf "$JPATH/etc/resolv.conf"

          doas mkdir -p "$JPATH/proc" "$JPATH/sys" "$JPATH/dev/shm"
          doas mount -t linprocfs linprocfs "$JPATH/proc"
          doas mount -t linsysfs linsysfs "$JPATH/sys"
          doas mount -t devfs devfs "$JPATH/dev"
          doas mount -t tmpfs tmpfs "$JPATH/dev/shm"

          doas jail -c name="$JAIL" path="$JPATH" ip4=inherit ip6=inherit \
            host.hostname="$JAIL" allow.raw_sockets=1 linux=new persist

          doas jexec "$JAIL" apt-get update -qq
          doas jexec "$JAIL" apt-get install -y -qq nsis

      - name: Build NSIS installer
        run: |
          JPATH="$JAIL_ROOT/$LINUX_JAIL"
          TAG="${GITHUB_REF_NAME:-dev}"
          VERSION="${TAG#v}"

          doas mkdir -p "$JPATH/tmp/build/installer"
          doas cp kpxc-bridge.exe "$JPATH/tmp/build/"
          doas cp installer/kpxc-bridge.nsi "$JPATH/tmp/build/installer/"

          doas jexec "$LINUX_JAIL" sh -c \
            "cd /tmp/build && makensis -DVERSION=${VERSION} -DOUTFILE=kpxc-bridge-${VERSION}-setup.exe installer/kpxc-bridge.nsi"

          cp "$JPATH/tmp/build/kpxc-bridge-${VERSION}-setup.exe" .
          file "kpxc-bridge-${VERSION}-setup.exe"
          ls -l "kpxc-bridge-${VERSION}-setup.exe"

      - name: Tear down Linux jail
        if: always()
        run: |
          JPATH="$JAIL_ROOT/$LINUX_JAIL"
          doas jail -r "$LINUX_JAIL" 2>/dev/null || true
          doas umount "$JPATH/dev/shm" 2>/dev/null || true
          doas umount "$JPATH/dev" 2>/dev/null || true
          doas umount "$JPATH/sys" 2>/dev/null || true
          doas umount "$JPATH/proc" 2>/dev/null || true
          if [ -d "$JPATH" ]; then
            doas chflags -R noschg "$JPATH" 2>/dev/null || true
            doas rm -rf "$JPATH"
          fi

      # --- Publish release ---
      - name: Publish release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          BASE_URL="$GITHUB_SERVER_URL/api/v1/repos/$REPO"
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          AUTH="Authorization: token $FORGEJO_TOKEN"

          # Delete existing release for this tag if present
          EXISTING_ID=$(curl -sf -H "$AUTH" "$BASE_URL/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
          if [ -n "$EXISTING_ID" ]; then
            curl -sf -X DELETE -H "$AUTH" "$BASE_URL/releases/$EXISTING_ID"
            echo "Deleted existing release $EXISTING_ID"
          fi

          # Create release
          RELEASE_ID=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"## KeePassXC TCP Bridge $TAG\\n\\nCommit: $GITHUB_SHA\\n\\n### Downloads\\n- **kpxc-bridge-${VERSION}-setup.exe** — Windows installer (installs service + firewall rule)\\n- **kpxc-bridge.exe** — Standalone binary\",\"draft\":false,\"prerelease\":false}" \
            "$BASE_URL/releases" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created release $RELEASE_ID"

          # Upload installer
          curl -sf -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@kpxc-bridge-${VERSION}-setup.exe" \
            "$BASE_URL/releases/$RELEASE_ID/assets?name=kpxc-bridge-${VERSION}-setup.exe"
          echo "Uploaded installer"

          # Upload standalone binary
          curl -sf -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @kpxc-bridge.exe \
            "$BASE_URL/releases/$RELEASE_ID/assets?name=kpxc-bridge.exe"
          echo "Uploaded standalone binary"
